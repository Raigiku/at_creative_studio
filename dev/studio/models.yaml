# Creative Studio — model list and per-model UI config
#
# Edit this file to add or remove models, or to change what the
# form looks like for each model. Restart studio.exe after editing.
#
# Each entry needs:
#   id:    the OpenRouter model identifier (required)
#   name:  what's shown in the dropdown (optional, defaults to id)
#
# Each entry MAY have a `capabilities` block. If absent, the form
# uses the static HTML defaults (every field enabled, all options
# available). When present, the block controls:
#
#   fields:       a map of form-field name → UI config
#     enabled:    whether the field is shown and editable
#     type:       "enum" (dropdown), "range" (number input),
#                 "text" (free-form), or "boolean" (checkbox)
#     values:     (enum only) the allowed options
#     min, max:   (range only) the inclusive bounds
#
#   constraints:  cross-field rules. Each rule says: "if `if_set`
#                 has a non-zero value, then `requires.field` must
#                 be in `requires.in`." The server enforces this on
#                 submit; the UI uses it to narrow dropdown options
#                 and auto-correct invalid combinations.
#
# Example: add a new image model by appending a new bullet under
# `image:`. If you don't add a `capabilities` block, the form will
# use the static defaults.
#
# Where this file lives:
#   - <binaryDir>/models.yaml  (next to studio.exe — used by default)
#   - $STUDIO_MODELS env var    (overrides the path entirely)
#
# If no models.yaml is found on startup, the server writes one with these
# defaults so you can immediately see the format and customize it.

image:
  - id: "x-ai/grok-imagine-image-quality"
    name: "Grok Imagine (Image) — quality"
    capabilities:
      fields:
        resolution:
          enabled: true
          type: "enum"
          values: ["1K", "2K"]
        aspect_ratio:
          enabled: true
          type: "enum"
          values: ["1:1", "3:4", "4:3", "9:16", "16:9", "2:3", "3:2", "9:19.5", "19.5:9", "9:20", "20:9", "1:2", "2:1", "auto"]
        n:
          enabled: true
          type: "range"
          min: 1
          max: 1
        input_references:
          enabled: true
          type: "range"
          min: 0
          max: 3

  - id: "openai/gpt-image-2"
    name: "OpenAI GPT Image 2"
    capabilities:
      fields:
        output_format:
          enabled: true
          type: "enum"
          values: [png, jpeg, webp]
        output_compression:
          enabled: true
          type: "range"
          min: 0
          max: 100
        quality:
          enabled: true
          type: "enum"
          values: [auto, low, medium, high]
        background:
          enabled: true
          type: "enum"
          values: [auto, opaque]
        n:
          enabled: true
          type: "range"
          min: 1
          max: 10
        input_references:
          enabled: true
          type: "range"
          min: 0
          max: 16
        resolution:
          enabled: false
      constraints:
        - if_set: output_compression
          requires:
            field: output_format
            in: [jpeg, webp]
          message: "this model only applies output_compression when output_format is jpeg or webp. Either switch the output format, or unset output_compression."

