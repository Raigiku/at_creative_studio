# Creative Studio — model list
#
# Edit this file to add or remove the models that show up in the
# dropdown. Restart studio.exe after editing.
#
# Each entry needs an `id` (the OpenRouter model identifier) and
# optionally a `name` (what's shown in the dropdown). If `name` is
# omitted, the id is used as the name.
#
# Example: add a new image model by appending a new bullet under
# `image:` — no need to touch any other file.
#
# Where this file lives:
#   - <binaryDir>/models.yaml  (next to studio.exe — used by default)
#   - $STUDIO_MODELS env var    (overrides the path entirely)
#
# If no models.yaml is found on startup, the server writes one with these
# defaults so you can immediately see the format and customize it.

image:
  - id: "x-ai/grok-imagine-image-quality"
    name: "Grok Imagine (Image) — quality"

video:
  - id: "bytedance/seedance-2.0"
    name: "Seedance 2.0 — video"
  - id: "x-ai/grok-imagine-video"
    name: "Grok Imagine — video"
  - id: "google/veo-3.1-lite"
    name: "Veo 3.1 Lite — video"
