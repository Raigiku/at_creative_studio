<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Creative Studio</title>
  <link rel="stylesheet" href="styles.css" />
  <!--
    Import map: gives bare specifiers `preact`, `preact/hooks`, `htm`
    to every <script type="module"> on the page. The official Preact
    "no build" workflow: https://preactjs.com/guide/v10/no-build-workflows

    The esm.sh CDN serves the official npm packages. esm.sh bundles
    preact and preact/hooks as separate modules but they share a
    single `options` object (via the `?external=preact` query), so
    hooks' `useState` etc. work with the `h` we import from `preact`.
  -->
  <script type="importmap">
    {
      "imports": {
        "preact": "https://esm.sh/preact@10.22.0",
        "preact/hooks": "https://esm.sh/preact@10.22.0/hooks?external=preact",
        "htm": "https://esm.sh/htm@3.1.1"
      }
    }
  </script>
</head>
<body>
  <div class="card">
    <header class="card-header">
      <h1 class="card-title">✨ Creative Studio</h1>
      <p class="card-sub">Generate images and video via OpenRouter. Outputs save into <code>ai_outputs/</code> 📁</p>
    </header>

    <!-- Preact mounts <App/> into #root. The form, all dropdowns,
         the preview, and the status bar are all rendered by Preact
         from the components/ tree. -->
    <div id="root"></div>

    <details class="help-footer">
      <summary>🔑 Need to set the API key?</summary>
      <p>Set the <code>OPENROUTER_API_KEY</code> environment variable before launching, or run <code>scripts/set-key</code> to store it in the OS credential manager.</p>
    </details>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
